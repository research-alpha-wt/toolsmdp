#       Requires nvidia-container-toolkit on the host and a CUDA base image.
#       Example:
#       train:
#         build:
#           context: .
#           dockerfile: Dockerfile.gpu
#         deploy:
#           resources:
#             reservations:
#               devices:
#                 - capabilities: [gpu]
#         volumes:
#           - .:/workspace
#           - ${DATA_ROOT:-./data_local}:/data
#           - ${CHECKPOINT_ROOT:-./checkpoints_local}:/checkpoints
#         environment:
#           - DATA_ROOT=/data
#           - CHECKPOINT_ROOT=/checkpoints
#           - WANDB_API_KEY=${WANDB_API_KEY}

services:
  dev:
    build: .
    volumes:
      - .:/workspace
      - ${DATA_ROOT:-./data_local}:/data
      - ${CHECKPOINT_ROOT:-./checkpoints_local}:/checkpoints
    environment:
      - DATA_ROOT=/data
      - CHECKPOINT_ROOT=/checkpoints
    command: bash
    stdin_open: true
    tty: true

  test:
    build: .
    volumes:
      - .:/workspace
    command: pytest tests/ -v --timeout=30

  download:
    build: .
    volumes:
      - ${DATA_ROOT:-./data_local}:/data
      - hf_cache:/root/.cache/huggingface
    environment:
      - DATA_ROOT=/data
    command: python -m data.download_and_format

volumes:
  hf_cache:
