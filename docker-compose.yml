services:
  dev:
    build: .
    volumes:
      - .:/workspace
      - ${DATA_ROOT:-./data_local}:/data
      - ${CHECKPOINT_ROOT:-./checkpoints_local}:/checkpoints
    environment:
      - DATA_ROOT=/data
      - CHECKPOINT_ROOT=/checkpoints
    command: bash
    # TODO: Add stdin_open: true and tty: true for interactive shell:
    #   stdin_open: true
    #   tty: true

  test:
    build: .
    volumes:
      - .:/workspace
    command: pytest tests/ -v
    # TODO: Add timeout to prevent hanging tests from blocking CI:
    #   command: pytest tests/ -v --timeout=30
